# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  pull_request:
    branches: [ "develop" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test
    - name: Install GGShield
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade ggshield

    - name: Run GGShield Secret Scan
      env:
        GITGUARDIAN_API_KEY: ${{ secrets.GG_API_KEY }}
      run: |
        echo "Fetching origin/develop..."
        git fetch origin develop
        HEAD_COMMIT=$(git rev-parse HEAD)
        BASE_COMMIT=$(git merge-base HEAD origin/develop)
        echo "Scanning from $BASE_COMMIT to $HEAD_COMMIT"
        ggshield secret scan commit-range "$BASE_COMMIT..$HEAD_COMMIT"
